name: NPM Otomatik Yayinlama

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # İŞTE YENİ NESİL GÜVENLİK BURASI! (OIDC Teknolojisi)

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: NPM'e Firlat
        run: npm publish --provenance